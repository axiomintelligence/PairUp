map $uri $pairup_cache_control {
  # Plain-named assets (no content hash in URL) — cache, but always revalidate
  # via etag. Browsers get a fast 304 when nothing has changed; new deploys
  # propagate immediately. Switch this to "public, max-age=604800, immutable"
  # once we ship fingerprinted asset names.
  ~*\.(js|css|svg|ico|png|webp|woff2?)$  "no-cache";
  default                                 "no-store";
}

server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Cache-Control $pairup_cache_control always;

  gzip on;
  gzip_vary on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }
}
