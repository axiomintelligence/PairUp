services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pairup
      POSTGRES_PASSWORD: pairup_local
      POSTGRES_DB: pairup
    ports:
      - "5433:5432"
    volumes:
      - pairup_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pairup -d pairup"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: pairup
      PGPASSWORD: pairup_local
      PGDATABASE: pairup
      PGSSL: disable
      ADMIN_PASSPHRASE: localdev
      PORT: 8080
    ports:
      - "8080:8080"

volumes:
  pairup_pg:
